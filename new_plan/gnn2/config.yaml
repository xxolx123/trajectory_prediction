# =============================================================================
# gnn2 配置（骨架占位）
#
# 接口：
#   输入: pred_traj [B, T=10, 6] (路网约束后)，eta [B] long 秒
#   输出: strike_pos(km) / strike_radius(km) / strike_conf
# =============================================================================

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

context:
  # ETA 归一化：模型内部把 eta(秒) / eta_scale_seconds 喂进 MLP
  eta_scale_seconds: 3600

model:
  type: "gnn2_mlp_stub"     # TODO: "strike_zone_gnn"
  fut_len: 10
  feat_dim: 6
  hidden_size: 128
  dropout: 0.0

train:
  device: "auto"
  seed: 42
  batch_size: 64
  num_epochs: 10
  lr: 1.0e-3
  weight_decay: 1.0e-5
  ckpt_dir: "checkpoints"
  log_interval: 100
