# =============================================================================
# gnn2 配置（骨架占位）
# =============================================================================

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

context:
  # 新 ContextBatch schema（与 common/context_schema.py 对齐）
  task_type_vocab:  1      # 敌方作战任务（目前只有 0 = 打击）
  type_vocab:       3      # 我方固定目标类型 0..2
  position_dim:     3      # 我方固定目标 xyz km
  road_max_points:  128    # 路网主干道 padding 上限（GNN2 不消费，只为 flatten 对齐）
  road_point_dim:   3
  own_info_dim:     4

model:
  type: "gnn2_mlp_stub"     # TODO: "strike_zone_gnn"
  fut_len: 10
  feat_dim: 6
  intent_feat_dim: 4         # 与 LSTM2.num_intent_classes 对齐
  hidden_size: 128
  dropout: 0.0

train:
  device: "auto"
  seed: 42
  batch_size: 64
  num_epochs: 10
  lr: 1.0e-3
  weight_decay: 1.0e-5
  ckpt_dir: "checkpoints"
  log_interval: 100
