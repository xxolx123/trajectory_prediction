# =============================================================================
# gnn1 配置（骨架占位）
# TODO: 等 data/generate_data.py 确定后，补齐 data 段的参数
# =============================================================================

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

# 与 common/context_schema.py 对齐；等真实接口定了再改
context:
  target_task_dim: 8
  n_fixed_targets: 4
  fixed_target_dim: 4
  target_type_dim: 4
  road_network_dim: 16
  # GNN1 不用 own_info，但 ContextBatch 统一有这个字段，占位维度即可
  own_info_dim: 4

model:
  type: "gnn1_mlp_stub"    # TODO: 替换成 "traj_selection_gnn"
  # 候选轨迹参数（要与 lstm1 一致）
  n_modes: 3
  fut_len: 10
  feat_dim: 6
  # MLP / GNN 隐藏层
  hidden_size: 128
  dropout: 0.0

train:
  device: "auto"
  seed: 42
  batch_size: 64
  num_epochs: 10
  lr: 1.0e-3
  weight_decay: 1.0e-5
  ckpt_dir: "checkpoints"
  log_interval: 100
