data:
  # ===================== 输出路径 =====================
  raw_dir: "data/raw"
  output_csv: "synthetic_trajectories.csv"

  # ===================== 基本时间尺度 =====================
  time_step: 60.0        # 每步时间间隔（秒）
  num_steps: 100         # 每条轨迹步数（可按场景调小到 30~60）

  # ===================== 5 类标签 & 每类样本数 =====================
  traj_types: ["straight", "left_turn", "right_turn", "s_curve", "u_turn"]

  num_traj_per_type:
    straight: 800
    left_turn: 800
    right_turn: 800
    s_curve: 800
    u_turn: 800

  # ===================== 车辆动力学上限 =====================
  speed_range_kmh: [15.0, 60.0]   # 速度采样区间
  min_speed_kmh: 10.0             # 裁剪下限（stop 段除外）
  max_accel_mps2: 0.8             # 普通乘用车舒适加速
  max_decel_mps2: 1.5             # 刹车可更硬
  max_yaw_rate_deg_s: 20.0        # 每秒最大偏航速率

  # ===================== 速度曲线采样 =====================
  speed_segments_range: [1, 4]    # 分几段
  speed_jitter_kmh: 1.0           # 每步高斯抖动 std
  allow_stop: false               # 是否允许某段强制停车
  stop_prob: 0.05                 # 若 allow_stop，触发概率

  # ===================== 每类 yaw-rate 采样 =====================
  straight:
    # 直线类：完全直线，默认不加任何偏航漂移。
    # 注意 drift 是"每秒偏航率 std (deg/s)"，会乘以 time_step=60s 累加到
    # heading 上，所以即使 0.2 也会让直线明显蛇形。需要时再小心开启。
    heading_drift_deg_s: 0.0

  turn:                           # left_turn / right_turn 共用
    n_turns_range: [1, 3]         # 每条轨迹几次转向
    angle_range_deg: [20.0, 120.0]
    duration_range_steps: [5, 40] # 每次转向持续多少步
    min_gap_steps: 3              # 段间 / 边界 最少保留的直线步
    straight_drift_deg_s: 0.0     # 非转向段的方向漂移（0 即纯直线）

  s_curve:
    n_segments_range: [2, 4]      # 交替段数（>=2）
    angle_range_deg: [20.0, 90.0]
    segment_len_range_steps: [8, 30]
    gap_steps_range: [0, 5]
    first_direction: "random"     # "left" / "right" / "random"
    drift_deg_s: 0.0

  u_turn:
    # 一次 ~180° 的大转向（掉头）。duration 限制在 <= in_len (20) 步，
    # 以便"完整 U 形"能装进训练窗口而被模型学到。
    n_turns_range: [1, 1]         # 每条只掉一次头（设 [1,2] 允许"去-回"）
    angle_range_deg: [150.0, 210.0]
    duration_range_steps: [6, 18]
    min_gap_steps: 10             # 掉头前后至少各留 10 步直线
    direction: "random"           # "left" / "right" / "random"
    straight_drift_deg_s: 0.0

  # ===================== 初始位姿 =====================
  init_x_range: [-30.0, 30.0]
  init_y_range: [-30.0, 30.0]
  init_z_range: [0.0, 0.0]

  use_vertical_motion: false
  vertical_vz_range_kmps: [-0.005, 0.005]

  # ===================== 随机种子 =====================
  random_seed: 42
  # split_seed: 42   # 可选：仅 traj_dataset.py 的分层划分单独指定；默认用 random_seed

  # ===================== traj_dataset 相关 =====================
  processed_dir: "data/processed"
  scaler_filename: "scaler_posvel.npz"

  in_len: 20
  out_len: 10

  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

  use_delta: true        # 位置改成"相邻步增量"
  normalize: true        # 对 6 维特征做标准化

model:
  type: "lstm"
  input_size: 6        # [x,y,z,vx,vy,vz]
  output_size: 6
  hidden_size: 256
  num_layers: 2
  out_len: 10          # 必须和 data.out_len 一致
  dropout: 0.0
  bidirectional: false
  modes: 5             # M 条候选轨迹

train:
  device: "auto"       # "cuda" / "cpu" / "mps" / "auto"
  seed: 42

  batch_size: 128
  num_epochs: 25

  lr: 1.5e-3
  weight_decay: 1.0e-5

  grad_clip: 1.0       # LSTM 梯度裁剪上限（0 表示不裁，推荐 1.0）

  ckpt_dir: "checkpoints"
  keep_top_k: 5        # 每个 run 最多保留 val_loss 最低的前 K 个 ckpt
  log_interval: 100

loss:
  # === mode 选择策略 ===
  # "hard"：经典 MTP 硬 WTA（Cui et al. 2019），推荐用来产生视觉上明显不同的多模态。
  #         每个样本只推动最接近的 mode，模仿 k-means 的"专业化分工"。
  #         和 old_plan/loss_mtp.py 的行为一致（唯一差别：不带 CE 分类损失）。
  # "soft"：Soft-WTA。所有 mode 都被拉向同一个目标，适合单模态数据但不产生多模态。
  # "topk"：前 k 小 mode 都拿梯度。
  mode_selection: "hard"
  soft_temperature: 1.0    # soft 时用
  top_k: 2                 # topk 时用

  # === Diversity 正则（可选，硬 WTA 下通常不需要开）===
  # 如果硬 WTA 下出现"dead mode"（winner_frac 某个维长期 < 0.05），说明该
  # mode 从未赢过，把它唤醒的办法是开一点 diversity_weight。
  #   weight=0.0    关闭（推荐默认，硬 WTA 自然会分化）
  #   weight=0.05   轻微唤醒 dead mode
  #   weight>=0.3   强行推开，可能让部分 mode 偏离合理区
  diversity_weight: 0.0
  diversity_margin: 1.0
