# =============================================================================
# constraint_optimizer 配置
# =============================================================================

module:
  enable: true             # 整体开关，方便 ablation
  # 可选:
  #   "pass_through"          原样返回
  #   "road_projection"       逐点硬投影到最近线段（旧实现，会"穿过路网空白处"）
  #   "road_arc_projection"   沿弧长投影（推荐）：每条候选选一条最匹配的分支，
  #                           按累积弧长贴在该分支上，输出严格沿路网折线走
  type: "road_arc_projection"
