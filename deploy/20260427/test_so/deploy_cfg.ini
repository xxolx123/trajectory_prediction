# deploy_cfg.ini  （和可执行文件 / .so 同目录均可）
# fusion 部署版（20260427）：双模式（with_road / no_road）.ms 模型按 use_road 选择。
#
# 查找顺序：环境变量 DEPLOY_CFG → ./deploy_cfg.ini → .so 同目录 / 可执行同目录

# ---- 路网模式开关 ----
# true  → 加载 with_road 模型，按 6~7 输入喂；上层传的 routes 会被使用
# false → 加载 no_road  模型，按 4~5 输入喂；上层传的 routes 会被忽略
# 切换该开关无需重新编译 .so，只需保证对应 model_path_* 指向正确的 .ms 文件。
use_road=true

# ---- 模型路径（两份 .ms）----
# 由 fusion/code/export_onnx.py 双模式导出（--mode both）后用 converter_lite 转换：
#   full_net_v2_no_road.onnx   → full_net_v2_no_road.ms
#   full_net_v2_with_road.onnx → full_net_v2_with_road.ms
model_path_with_road=./full_net_v2_with_road.ms
model_path_no_road=./full_net_v2_no_road.ms

# 旧版兼容（可选）：若上面两个新键缺失（或对应 .ms 不存在），回退到 model_path。
# 这样旧的部署目录（只有一份 full_net_v2.ms）仍能继续工作。
# model_path=./full_net_v2.ms

# ---- 路网张量上限（仅 use_road=true 且 .ms 含 road_points/road_mask 时生效）----
# 必须与训练 / 调用方约定一致：超出会被截断，不足部分 mask=false
nb_max=4
np_max=128

# ---- 兜底默认值 ----
# 当 LocData_loc 末帧的 task_type / our_type / target_*/eta 为 0（即调用方未填）
# 时使用这里的默认值
default_task_type=0
default_our_type=0
default_target_lon=116.30
default_target_lat=39.90
default_target_alt_m=0.0
default_eta_sec=0
